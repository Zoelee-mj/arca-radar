name: ARCA daily report

on:
  schedule:
    - cron: '0 1 * * *'      # 每天 UTC 01:00 = 北京时间 09:00
  workflow_dispatch:          # 允许网页手动运行

permissions:
  contents: write             # 需要写权限，才能把 seen.json 存回仓库
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 生成报告
        run: |
          python main.py
          mkdir -p _site
          cp report.html _site/index.html
      - name: 保存已见活动名单
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git commit -m "update seen list" || echo "名单无变化，跳过提交"
          git push || echo "无需推送"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
